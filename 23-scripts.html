    init() {
      setTimeout(() => { this.loadingDone = true; }, 1800);
      setTimeout(() => {
        const el = document.getElementById('loading-screen');
        if (el) el.style.display = 'none';
      }, 2500);
      window.addEventListener('scroll', () => this.updateScroll());
      this.updateScroll();
      this.cookieAccepted = localStorage.getItem('tivi_cookie_accepted') === 'true';
      this.$nextTick(() => {
        if (typeof AOS !== 'undefined') AOS.init({ once: true, duration: 700, easing: 'ease-out-cubic' });
      });
      this._initSkillObserver();
      this._baActive = false;
      this._baPct = 50;
    },

    updateScroll() {
      const y = window.scrollY;
      this.scrolled = y > 60;
      this.showBackToTop = y > 400;
      this.showStickyPill = y > 600;
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      this.scrollProgress = docH > 0 ? Math.round((y / docH) * 100) : 0;
      document.getElementById('scroll-progress').style.width = this.scrollProgress + '%';
    },

    openProject(proj) { this.activeProject = proj; document.body.style.overflow = 'hidden'; },
    closeProject() { this.activeProject = null; document.body.style.overflow = ''; },
    scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); },
    toggleFaq(i) { this.faqOpen = this.faqOpen === i ? null : i; },

    validateField(field) {
      if (field === 'first') this.formErrors.first = (!this.form.first || this.form.first.trim().length < 2) ? 'Name must be at least 2 characters.' : '';
      if (field === 'email') { const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; this.formErrors.email = (!this.form.email || !re.test(this.form.email)) ? 'Please enter a valid email address.' : ''; }
      if (field === 'message') this.formErrors.message = (!this.form.message || this.form.message.trim().length < 10) ? 'Please describe your project (min 10 characters).' : '';
    },

    submitForm() {
      this.validateField('first'); this.validateField('email'); this.validateField('message');
      if (this.formErrors.first || this.formErrors.email || this.formErrors.message) return;
      const payload = new FormData();
      payload.append('_to', 'consultation@tiviforge.com');
      payload.append('_subject', 'New Strategy Session Request — Tiviforge.com');
      payload.append('_replyto', this.form.email);
      payload.append('name', (this.form.first + ' ' + this.form.last).trim());
      payload.append('email', this.form.email);
      payload.append('service', this.form.type || 'Not specified');
      payload.append('message', this.form.message);
      payload.append('_captcha', 'false');
      fetch('https://formsubmit.co/ajax/consultation@tiviforge.com', {
        method: 'POST',
        body: payload,
        headers: { 'Accept': 'application/json' }
      }).catch(() => {});
      this.formSent = true;
    },

    acceptCookies() { this.cookieAccepted = true; localStorage.setItem('tivi_cookie_accepted', 'true'); },

    sendChat() { const txt = this.chatInput.trim(); if (!txt) return; this.chatInput = ''; this.sendChatMessage(txt); },

    sendChatMessage(text) {
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      this.chatMessages.push({ role: 'user', text, time: now });
      this.chatTyping = true;
      this._scrollChat();
      const delay = 1200 + Math.random() * 400;
      setTimeout(() => {
        this.chatTyping = false;
        const response = this.getBotResponse(text.toLowerCase());
        const msgObj = { role: 'bot', text: response.text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), showBookingForm: false, showPortfolioBtn: false };
        if (response.showBookingForm) { msgObj.showBookingForm = true; this.bookingSubmitted = false; this.bookingForm = { name: '', email: '', date: '', time: '' }; }
        if (response.showPortfolioBtn) msgObj.showPortfolioBtn = true;
        this.chatMessages.push(msgObj);
        this._scrollChat();
      }, delay);
    },

    getBotResponse(input) {
      if (/pricing|cost|price|how much|packages|afford|investment/.test(input)) {
        return { text: "Here's our full revenue ladder:\n\n🆓 **Free Strategy Audit** — $0\n🔍 **Website Revenue Review** — $495\n🔹 **Executive Portfolio Build** — $2,995\n🔸 **Full Brand Transformation** — $6,995\n🏆 **C-Suite Digital Leadership** — $12,995\n🔥 **Revenue Infrastructure Build** — $18,500+\n🔄 **Growth Retainer** — $250–$1,500/mo\n\nWant to book a free strategy call?" };
      }
      if (/book|call|schedule|meeting|calendar|discovery|strategy/.test(input)) {
        return { text: "I'd love to set up a strategy call! Please fill in your details below and we'll confirm your slot right away.", showBookingForm: true };
      }
      if (/portfolio|projects|work|examples|case study/.test(input)) {
        return { text: "Here are a few highlights from our recent work:\n\n🏗️ **Marcus Chen (COO)** — +340% LinkedIn views\n⚡ **Priya Nakamura (VP)** — Featured in Forbes\n🏆 **James Okafor (CEO)** — PE board seat secured\n\nWant to see more details?", showPortfolioBtn: true };
      }
      if (/lane|service|what do you do|offer|help/.test(input)) {
        return { text: "We operate across three strategic service lanes:\n\n**Lane 01 — Personal Authority**\n**Lane 02 — Business Revenue Sites**\n**Lane 03 — Growth Systems**\n\nMost clients engage two or three lanes together. Want to map out the right build for you?" };
      }
      if (/hello|hi|hey|sup|good morning|good afternoon/.test(input)) {
        return { text: "Hey there! Welcome to Tivi Forge — your digital brand architecture and revenue infrastructure partner.\n\nWhat are you looking to build?" };
      }
      return { text: "Great question. For more details, I'd recommend booking a quick strategy call with Tivi directly — it's free and takes 20 minutes.\n\nWant me to set that up for you?" };
    },

    submitBooking() {
      const email = this.bookingForm.email;
      if (this.bookingForm.name) this.leadData.name = this.bookingForm.name;
      if (email) this.leadData.email = email;
      this.bookingSubmitted = true;
      for (let i = this.chatMessages.length - 1; i >= 0; i--) {
        if (this.chatMessages[i].showBookingForm) { this.chatMessages[i].showBookingForm = false; break; }
      }
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      this.chatMessages.push({ role: 'bot', text: `Your strategy call is booked! You'll receive a confirmation at ${email}. Looking forward to mapping out your revenue infrastructure together.`, time: now });
      this.bookingForm = { name: '', email: '', date: '', time: '' };
      this._scrollChat();
    },

    _scrollChat() {
      this.$nextTick(() => {
        const el = document.getElementById('chat-messages-container');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    _initSkillObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.querySelectorAll('.skill-bar-fill').forEach(bar => {
              const w = bar.style.width;
              bar.style.width = '0%';
              setTimeout(() => { bar.style.width = w; }, 100);
            });
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.3 });
      this.$nextTick(() => {
        const el = document.getElementById('skills-container');
        if (el) observer.observe(el);
      });
    },

    startBA(e) {
      this._baActive = true;
      this.moveBA(e);
      const moveFn = (ev) => this.moveBA(ev);
      const stopFn = () => { this._baActive = false; document.removeEventListener('mousemove', moveFn); document.removeEventListener('mouseup', stopFn); document.removeEventListener('touchmove', moveFn); document.removeEventListener('touchend', stopFn); };
      document.addEventListener('mousemove', moveFn);
      document.addEventListener('mouseup', stopFn);
      document.addEventListener('touchmove', moveFn);
      document.addEventListener('touchend', stopFn);
    },

    moveBA(e) {
      if (!this._baActive) return;
      const slider = document.getElementById('ba-slider');
      if (!slider) return;
      const rect = slider.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
      this._baPct = pct;
      const after = document.getElementById('ba-after');
      const divider = document.getElementById('ba-divider');
      const handle = document.getElementById('ba-handle');
      if (after) after.style.width = (100 - pct) + "%";
      if (divider) divider.style.left = pct + "%";
      if (handle) handle.style.left = pct + "%";
    }
  }
}
</script>
